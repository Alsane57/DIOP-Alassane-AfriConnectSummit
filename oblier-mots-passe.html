            </div>
            <form class="search-navbar" role="search" action="/recherche" method="GET">
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0">

            </button> -->

   <!-- contenu principal -->
    <main>
        <section class="password-reset-section">
            <div class="container mt-5">
                <h1>Réinitialisation du mot de passe</h1>
                <p>Entre le code de réinitialisation envoyé à votre email.</p>
                <form>
                    <div class="mb-3">
                        <label for="code" class="form-label">Code de réinitialisation</label>
                        <input type="text" class="form-control" id="code" placeholder="Entrez le code">
                    </div>
                    <a href="connexion.html" class="btn btn-primary">Valider</a>
                </form>
            </div>
        </section>

    <footer>
        <!-- div: Social media -->
            <div class="social">

        <div class="social-media">

                <div class="social-icones">
                    <div class="fac"><a href="https://www.facebook.com"><img src="images/facboook.jpg" alt=""></a></div>
                    <div class="insta"><a href="https://www.instagram.com"><img src="images/insta.png" alt="" ></a></div>
                    <div class="twit"><a href="https://www.twitter.com"><img src="images/twitter.png" alt=""></a></div>

                    <div class="yt"><a href="https://www.youtube.com"><img src="images/youtube.jpg" alt=""></a></div>
