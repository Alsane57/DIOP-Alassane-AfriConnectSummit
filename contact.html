    <!-- les links -->
    <link rel="stylesheet" href="styles.css" type="text/css">
    <!-- Fonts Google --> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Font Awesome --> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="nav">
            <!-- Navigation links -->
            <div class="logo">Afri <span> connect</span><span>2026</span></div>
            <div class="nav-menu" id="nav-menu">
                <ul class="nav-links">
                    <li><a href="index.html" class="nav-link active">Accueil</a></li>
                    <li><a href="programme.html" class="nav-link">Programme</a></li>
                    <li><a href="intervenants.html" class="nav-link">Intervenants</a></li>
                    <li><a href="contact.html" class="nav-link">Contact</a></li>
                </ul>
                <div>
                    <button>
                        <a href="inscription.html">Inscription</a>
                    </button>
                </div>
                <button id="theme-toggle" class="theme-toggle">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </button>
            </div>
            <button class="hamburger" id="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </nav>
    </header>
    <!-- Main content -->
    <main>
        <!-- Hero section -->
        <section>
            <!-- formulaire de contact -->
            <form>
                <label for="name">Nom:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>

                <button type="submit">Envoyer</button>
            </form>
        </section>      
    </main> 
    <!-- Footer -->
    <footer>
        <!-- Footer content -->

            <ul>

            </ul>
        </div>
